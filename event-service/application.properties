server.port=8082
spring.application.name=event-service

# Kafka Configuration â must match your notification-service broker
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.retries=3
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1

# Kafka Topic â same topic your notification-service consumer listens to
kafka.topic.name=ecommerce-events

# CORS â allow notification-service frontend on 8081 and this dashboard on 8082
app.cors.allowed-origins=http://localhost:8081,http://localhost:8082

# Logging
logging.level.com.digyai=DEBUG
logging.level.org.apache.kafka=WARN


# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App info shown at /actuator/info
info.app.name=Event Service
info.app.version=1.0.0
info.app.port=8082
info.app.description=Kafka Event Producer — ShopFlow Dashboard
info.app.kafka.topic=ecommerce-events
info.app.university=Central University of Rajasthan
info.app.student=Mohit (2022BTCSE020)